name: Build Web

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        env:
          # Repository secret: Settings → Secrets and variables → Actions → VITE_API_URL
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build
