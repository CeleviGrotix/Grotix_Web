name: Build Web

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      # La URL de producción viene de .env.production en el repo (Vite la incrusta en el build).
      # No forzar VITE_API_URL vacío desde un secret ausente, o pisaría ese archivo.
      - name: Build
        run: npm run build
